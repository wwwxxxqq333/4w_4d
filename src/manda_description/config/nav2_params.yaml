controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 10.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.1
      stateful: true
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      motion_model: "Omni"

      # ---- Prediction horizon -----------------------------------------------
      time_steps: 56
      model_dt: 0.05

      # ---- Sampling ---------------------------------------------------------
      batch_size: 2000
      temperature: 0.3
      vx_stddev: 0.25
      vy_stddev: 0.25
      wz_stddev: 0.5

      # ---- Velocity limits (Omni: vx, vy, omega are independent) ------------
      max_vel_x: 1.5
      min_vel_x: -1.5
      max_vel_y: 0.75
      min_vel_y: -0.75
      max_vel_theta: 2.0
      min_vel_theta: -2.0

      # ---- Noise & robustness -----------------------------------------------
      regenerate_noise: true
      retrospective_penalty: 0.05

      # ---- Path tracking ---------------------------------------------------
      lookahead_dist: 0.8
      transform_tolerance: 1.0

      # ---- Critics ----------------------------------------------------------
      critics:
        - "ConstraintCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "ObstaclesCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"

      ConstraintCritic:
        enabled: true
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_weight: 5.0
        threshold_to_consider: 0.5
        power: 1

      GoalAngleCritic:
        enabled: true
        cost_weight: 3.0
        threshold_to_consider: 0.5
        power: 1

      ObstaclesCritic:
        enabled: true
        cost_weight: 10.0
        consider_footprint: false
        collision_cost: 100000.0
        inflation_radius: 0.4
        repulsion_weight: 1.5

      PathFollowCritic:
        enabled: true
        cost_weight: 10.0
        offset_from_furthest: 20
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        power: 1

      PathAngleCritic:
        enabled: true
        cost_weight: 2.0
        offset_from_furthest: 10
        threshold_to_consider: 0.5
        power: 1

      PreferForwardCritic:
        enabled: true
        cost_weight: 0.5
        threshold_to_consider: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: true
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.40, 0.35], [0.40, -0.35], [-0.40, -0.35], [-0.40, 0.35]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          obstacle_max_range: 4.5
          raytrace_min_range: 0.05
          obstacle_min_range: 0.05
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.40
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: true
      rolling_window: false
      width: 10
      height: 10
      resolution: 0.05
      footprint: "[[0.40, 0.35], [0.40, -0.35], [-0.40, -0.35], [-0.40, 0.35]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          obstacle_max_range: 4.5
          raytrace_min_range: 0.05
          obstacle_min_range: 0.05
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.40
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.0000001
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_costmap_topic: /local_costmap/costmap_raw
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 1.0
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 30.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.5, 0.75, 2.0]
    min_velocity: [-1.5, -0.75, -2.0]
    max_accel: [2.0, 1.0, 4.0]
    max_decel: [-2.0, -1.0, -4.0]
    odom_topic: "/groundtruth_odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
