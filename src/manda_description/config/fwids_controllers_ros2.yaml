controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    front_left_steer_controller:
      type: position_controllers/JointGroupPositionController
    front_right_steer_controller:
      type: position_controllers/JointGroupPositionController
    rear_left_steer_controller:
      type: position_controllers/JointGroupPositionController
    rear_right_steer_controller:
      type: position_controllers/JointGroupPositionController

    front_left_rotor_controller:
      type: velocity_controllers/JointGroupVelocityController
    front_right_rotor_controller:
      type: velocity_controllers/JointGroupVelocityController
    rear_left_rotor_controller:
      type: velocity_controllers/JointGroupVelocityController
    rear_right_rotor_controller:
      type: velocity_controllers/JointGroupVelocityController

# --- steer position controllers ---
front_left_steer_controller:
  ros__parameters:
    joints:
      - front_left_wheel_steer_joint
    gains:
      front_left_wheel_steer_joint: {p: 100.0, i: 10.0, d: 1.0, i_clamp: 50.0}

front_right_steer_controller:
  ros__parameters:
    joints:
      - front_right_wheel_steer_joint
    gains:
      front_right_wheel_steer_joint: {p: 100.0, i: 10.0, d: 1.0, i_clamp: 50.0}

rear_left_steer_controller:
  ros__parameters:
    joints:
      - rear_left_wheel_steer_joint
    gains:
      rear_left_wheel_steer_joint: {p: 100.0, i: 10.0, d: 1.0, i_clamp: 50.0}

rear_right_steer_controller:
  ros__parameters:
    joints:
      - rear_right_wheel_steer_joint
    gains:
      rear_right_wheel_steer_joint: {p: 100.0, i: 10.0, d: 1.0, i_clamp: 50.0}

# --- rotor velocity controllers ---
front_left_rotor_controller:
  ros__parameters:
    joints:
      - front_left_wheel_rotor_joint
    gains:
      front_left_wheel_rotor_joint: {p: 10.0, i: 1.0, d: 0.1, i_clamp: 50.0}

front_right_rotor_controller:
  ros__parameters:
    joints:
      - front_right_wheel_rotor_joint
    gains:
      front_right_wheel_rotor_joint: {p: 10.0, i: 1.0, d: 0.1, i_clamp: 50.0}

rear_left_rotor_controller:
  ros__parameters:
    joints:
      - rear_left_wheel_rotor_joint
    gains:
      rear_left_wheel_rotor_joint: {p: 10.0, i: 1.0, d: 0.1, i_clamp: 50.0}

rear_right_rotor_controller:
  ros__parameters:
    joints:
      - rear_right_wheel_rotor_joint
    gains:
      rear_right_wheel_rotor_joint: {p: 10.0, i: 1.0, d: 0.1, i_clamp: 50.0}
